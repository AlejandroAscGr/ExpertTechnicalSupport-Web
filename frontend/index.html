<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ISANA LABS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="./css/style.css" rel="stylesheet">
</head>
<body class="login-bg">

    <div class="container d-flex justify-content-center align-items-center vh-100 position-relative content-wrapper">
        
        <div class="login-card rounded-4 shadow-lg d-flex flex-column flex-lg-row overflow-hidden">
            
            <div class="left-panel d-flex flex-column justify-content-center align-items-center text-center p-5">
                <h2 class="fw-bold text-white mb-2">¡Hola, Bienvenido!</h2>
                <p class="text-white-50 mb-4">¿No tienes una Cuenta?</p>
                <button type="button" class="btn btn-outline-light rounded-pill px-5 py-2 fw-semibold">
                    Registrarse
                </button>
            </div>

            <div class="right-panel p-5 d-flex flex-column justify-content-center">
                
                <div class="mb-4">
                    <div class="d-flex justify-content-center align-items-center mb-3">
                        <div class="me-3">
                            <img src="img/logoETS75px.png" alt="Logo ETS" style="max-height: 60px; width: auto;">
                        </div>
                        <div class="text-start" style="color: #5c636a; line-height: 1.1;">
                            <div class="fs-4 fw-medium">Expert</div>
                            <div class="fs-4 fw-bold">Technical</div>
                            <div class="fs-4 fw-bold">Support</div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-center align-items-center border-top pt-2 mx-5">
                        <p class="text-secondary small mb-0">Powered by ISANA LABS</p>
                    </div>
                </div>

                <h3 class="text-center fw-bold mb-4 text-dark">Iniciar Sesión</h3>

                <form id="loginForm">
                    <div class="input-group mb-3">
                        <input name="emailemp" type="text" class="form-control glass-input custom-rounded-start" placeholder="Usuario / Correo" required>
                        <span class="input-group-text glass-addon"><i class="bi bi-person text-secondary"></i></span>
                    </div>
                    
                    <div class="input-group mb-2">
                        <input name="pass" type="password" class="form-control glass-input custom-rounded-start" placeholder="Password" required>
                        <span class="input-group-text glass-addon"><i class="bi bi-lock text-secondary"></i></span>
                    </div>
                    
                    <div class="text-center mb-4">
                        <a href="#" class="text-success small text-decoration-none fw-semibold">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold login-btn mb-4">
                        Iniciar Sesión
                    </button>
                    
                    <div class="text-center mt-2">
                        <p class="text-secondary small mb-3">o Iniciar Sesión con las Plataformas Sociales</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="button" class="btn social-btn"><i class="bi bi-google"></i></button>
                            <button type="button" class="btn social-btn"><i class="bi bi-facebook"></i></button>
                            <button type="button" class="btn social-btn"><i class="bi bi-github"></i></button>
                            <button type="button" class="btn social-btn"><i class="bi bi-linkedin"></i></button>
                        </div>
                    </div>
                </form>
                
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
